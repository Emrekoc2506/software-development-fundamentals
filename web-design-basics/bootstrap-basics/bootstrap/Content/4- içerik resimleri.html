<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- ✅ Bootstrap CSS bağlantısı -->
<link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
/>
</head>
<body>
    <div class = "container mt -4">
        <h1>img-fluif</h1>
        <img src="https://placehold.co/800x600" class="fluid" alt="burada resim var"> <!-- class="fluid" : mabilde resmin taşmaması için kullanılır  -->
        <h2>img - thumbnail</h2>
        <img src="https://placehold.co/200x150" class="thumbnail" alt="Burada resim var">
        <img src="https://placehold.co/200x150" class="thumbnail" alt="Burada resim var">
        <img src="https://placehold.co/200x150" class="thumbnail" alt="Burada resim var">

        <h2>img - siralama thumbnail</h2>
        <img src="https://placehold.co/200x150" class="thumbnail float start"            alt="Burada resim var">
        <img src="https://placehold.co/200x150" class="thumbnail float end"              alt="Burada resim var">
        <img src="https://placehold.co/200x150" class="thumbnail float  mx-auto d-block" alt="Burada resim var">


        
    </div>
</body>
</html>
