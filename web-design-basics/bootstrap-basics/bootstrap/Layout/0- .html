<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bootstrap Grid Test</title>

<!-- ✅ Bootstrap CSS bağlantısı -->
<link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
/>
</head>
<body>

<!--📱 Ne İşe Yarar Bu?
Mobilde (küçük ekran): Hepsi alt alta (col-12)
Tablet ve üzeri (≥768px): 3 sütun yan yana (col-md-4)
-->

<!-- ✅ Sayfa ortasında container -->
<div class="container bg-secondary p-3">
<!-- ✅ Grid satırı -->
<div class="row">
    <!-- ✅ 1. sütun -->
    <div class="col-12 col-md-4 bg-primary text-white p-3 mb-2">
    Kolon 1
    </div>

    <!-- ✅ 2. sütun -->
    <div class="col-12 col-md-4 bg-success text-white p-3 mb-2">
    Kolon 2
    </div>

    <!-- ✅ 3. sütun -->
    <div class="col-12 col-md-4 bg-danger text-white p-3 mb-2">
    Kolon 3
    </div>
</div>
</div>

</body>
</html>
