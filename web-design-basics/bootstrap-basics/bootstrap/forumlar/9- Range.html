<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bootstrap Grid Test</title>

<!-- ✅ Bootstrap CSS bağlantısı -->
<link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
/>
</head>
<body>
<div class="container mt-4">
    <div class="row">
        <div class="col-4 mx-auto">
            <form>
                <div class="mb-3">
                    <label for="ragne1" class="form-label">Fiyat Aralıgı</label>
                    <input 
                    type="range" 
                    class="form-range" 
                    id="range1"
                    min="2"
                    max="6"
                    step="0.5"
                    >
                    --------------------------------------------------------------------------------------------
                    --------------------------------------------------------------------------------------------

                    <label for="range2" class="form-label">fiyat Aralıgı Numaralı</label>
                    <input 
                    type="range"
                    class="form-range"
                    min="0"
                    max="100"
                    value="50"
                    id="range2"
                    >
                    <output for="range2" id="rangeValue2"aria-hidden="true"></output>
                    <script>
                        const rangeInput = document.getElementById('customRange4');
                        const rangeoutput = document.getElementById('rangeValue');

                        rangeoutput.textContent=rangeInput.value;
                        
                        rangeInput.addEventListener('input',function() {
                        rangeoutput.textContent=this.value;
                        });
                    </script>
            </form>
        </div>

    </div>
</div>
</body>
</html>
