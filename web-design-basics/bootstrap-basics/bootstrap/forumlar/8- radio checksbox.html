<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bootstrap Grid Test</title>

<!-- ✅ Bootstrap CSS bağlantısı -->
<link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
/>
</head>
<body>
<div class="container mt-4">
    <div class="row">
        <div class="col-4 mx-auto">
            <form>
                    <div class="mb-3 form-check">
                    <input 
                    type="checkbox"
                    class="form-check-input" 
                    id="check1">
                    <label 
                    for="check1"
                    class="form-check-label">check1</label>
                    </div>

                    <div class="mb-3 form-check">
                    <input 
                    type="checkbox"
                    class="form-check-input" 
                    id="check2">
                    <label 
                    for="check2"
                    class="form-check-label">check2
                    disabled</label>
                    </div>

                    <div class="mb-3 form-check">
                    <input 
                    type="checkbox"
                    class="form-check-input" 
                    id="check3">
                    <label 
                    for="check3"
                    class="form-check-label">check3</label>
                    </div>

                    <div class="mb-3 from-check">
                    <input
                    type="radio"
                    class="form-radio-input" 
                    name="radio-test"
                    id="radio1">
                    <label 
                    for="radio1" 
                    class="form-radio-label">radio1</label>
                    </div>

                    <div class="mb-3 from-check">
                    <input
                    type="radio"
                    class="form-radio-input"
                    name="radio-test"
                    id="radio2">
                    <label 
                    for="radio2"
                    class="form-radio-label">radio2</label>
                    </div>

                
            </form>
        </div>
    </div>
</div>
</body>
</html>
