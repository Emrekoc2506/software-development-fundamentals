<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bootstrap Grid Test</title>

<!-- ✅ Bootstrap CSS bağlantısı -->
<link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
/>
</head>
<body>
<div class="container mt-4">
    <div class="row">
        <div class="col-4 mx-auto">
            <form>
                <div class="input-group mb-3">
                    <label class="input-group-text" id="basic-addon1">@</label>
                    <input 
                    type="text"
                    class="form-control"
                    placeholder="Username"
                    aria-label="Username"
                    aria aria-describedby="basic-addon10    ">
                </div>
                <div class="input-group mb-3">
                    <input type="text" class="form-control" placeholder="username" aria-label="Username">
                    <label class="input-group-text">@</label>
                    <input type="text" class="form-control" placeholder="server" aria-label="server">
                </div>
            <div class="input-group mb-3">
                <div class="input-group">
                    <label class="input-group-text">Metin(textarea)</label>
                    <textarea class="form-control" aria-label="W      ith textarea"></textarea>
                </div>
            </div>
                <div class="input-group mb-3">
                    <div class="input-group-text">
                        <input class="form-input mt-0" type="checkbox" value="" aria-label="checboc for following text input">
                    </div>
                    <input type="text" class="form-control" aria-label="Text input with checbox">
                </div>
            <div class="input-group mb-3">
                <div class="input-group">
                    <div class="input-group-text">
                        <input class="form-check-input" type="radio" value="" aria-label="Radio button for following text input">
                    </div>
                    <input type="text" class="form-control" aria-label=""text input with radio button>
            </div>
            </div>
            <div class="input-group mb-3">
                <div class="input-group">
                    <div class="input-group-text">
                        <input class="form-check-input" type="radio" value="" aria-label="Radio button for following text input">
                    </div>
                    <input type="text" class="form-control" aria-label=""text input with radio button>
                </div>
            </div>
                <div class="input-group mb-3">
                    
                    <button type="button" class="btn btn-outline-secondary dropdown-toggle-split" data-bs-toggle="dropdown" aria-expanded="false">
                        <label class="visually-hidden">toggle dropdown</label>
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">Action</a></li>
                        <li><a class="dropdown-item" href ="#">Another Action</a></li>
                        <li><a class="dropdown-item" href ="#">Something else here</a></li>
                        <li><hr class="dropdoen-divider"></li>
                        <li><a class="dropdown-item" href="#">separated link</a></li>
                    </ul>
                    <input type="text" class="form-control" aria-label="text input with dropdown button">
                </div>
                <div class="input-group mb-3">
                    <input type="text" class="form-control" aria-label="text input with dropdown butoon">
                    <button  class="btn btn-outline-secondary dropdown-toggle-split" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <label class="visually-hidden">toggle dropdown</label>
                    </button>
                    <ul class="dropdown-menu dropline-menu-end">
                        <li><a class="dropdown-item" href="#">Action</a></li>
                        <li><a class="dropdown-item" href ="#">Another Action</a></li>
                        <li><a class="dropdown-item" href ="#">Something else here</a></li>
                        <li><hr class="dropdoen-divider"></li>
                        <li><a class="dropdown-item" href="#">separated link</a></li>
                    </ul>
                    
                </div>
                
            </form>
        </div>
    </div>
</div>

</html>
