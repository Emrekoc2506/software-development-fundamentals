<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bootstrap Grid Test</title>

<!-- ✅ Bootstrap CSS bağlantısı -->
<link 
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
    rel="stylesheet"
/>
</head>
<body>
<label for="exampleColorInput" class="form-label">Color picker</label>
<!-- 
label: Renk seçici alanının başlığı, kullanıcıya ne için olduğunu söyler
for="exampleColorInput": bu label, id’si exampleColorInput olan input ile ilişkilidir
class="form-label": Bootstrap’in form etiket stilini uygular
-->

<input 
type="color" 
class="form-control form-control-color" 
id="exampleColorInput" 
value="#563d7c" 
title="Choose your color"
>
<!--
type="color": HTML5 renk seçici input tipi, kullanıcıya renk paleti sunar
class="form-control form-control-color": Bootstrap’in genel form stili ve renk seçici için özel stil sınıfı
id="exampleColorInput": label ile eşleşen benzersiz kimlik
value="#563d7c": inputun varsayılan (başlangıç) rengi (koyu mor-mavi)
title="Choose your color": kullanıcı fareyi input üzerine getirdiğinde görünen açıklama balonu (tooltip)
-->

</body>
</html>
