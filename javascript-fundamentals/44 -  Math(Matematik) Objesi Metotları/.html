<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
    //🧮 Math (Matematik) Metotları:

//🔢 Mutlak Değer (Absolute Value)
console.log("Math.abs(-5) =", Math.abs(-5));  // 5
console.log("Math.abs(3) =", Math.abs(3));    // 3

//🔼 Yukarı Yuvarlama (Ceiling)
console.log("Math.ceil(4.1) =", Math.ceil(4.1));   // 5
console.log("Math.ceil(-3.7) =", Math.ceil(-3.7)); // -3

//🔽 Aşağı Yuvarlama (Floor)
console.log("Math.floor(4.9) =", Math.floor(4.9));   // 4
console.log("Math.floor(-3.1) =", Math.floor(-3.1)); // -4

//🔄 En Yakın Tam Sayıya Yuvarlama (Round)
console.log("Math.round(4.5) =", Math.round(4.5));   // 5
console.log("Math.round(4.4) =", Math.round(4.4));   // 4
console.log("Math.round(-3.6) =", Math.round(-3.6)); // -4

//📈 En Büyük Sayıyı Bulma (Max)
console.log("Math.max(3,7,2,9) =", Math.max(3,7,2,9));  // 9

//📉 En Küçük Sayıyı Bulma (Min)
console.log("Math.min(3,7,2,9) =", Math.min(3,7,2,9));  // 2

//📊 Üs Alma (Power)
console.log("Math.pow(2,3) =", Math.pow(2,3));  // 8 (2 üzeri 3)
console.log("Math.pow(5,2) =", Math.pow(5,2));  // 25 (5 kare)

//√ Karekök (Square Root)
console.log("Math.sqrt(16) =", Math.sqrt(16));  // 4
console.log("Math.sqrt(9) =", Math.sqrt(9));    // 3

//🎲 Rastgele Sayı Üretme (Random)
// 0 (dahil) ile 1 (hariç) arasında ondalıklı sayı verir
console.log("Math.random() =", Math.random());

// Tam sayı rastgele sayı örneği (0-9 arası)
console.log("0-9 arası rastgele tam sayı =", Math.floor(Math.random() * 10));

//✂ Ondalık Kısmı Atma (Truncate)
console.log("Math.trunc(4.9) =", Math.trunc(4.9));    // 4
console.log("Math.trunc(-4.9) =", Math.trunc(-4.9));  // -4

</script>
</body>
</html>
