<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Pro - Gelişmiş Giriş</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1f2029; /* Koyu Arka Plan */
            overflow: hidden;
        }

        /* Arka Plandaki Hareketli Işık Süzmesi */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: linear-gradient(#ffeb3b, #e91e63);
            border-radius: 50%;
            transform: translate(-150px, -100px);
            filter: blur(100px); /* Işık yayılması */
            z-index: -1;
            animation: float 6s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: linear-gradient(#2196f3, #3f51b5);
            border-radius: 50%;
            transform: translate(150px, 150px);
            filter: blur(100px);
            z-index: -1;
            animation: float 6s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(-150px, -100px); }
            50% { transform: translate(-130px, -80px); }
        }

        /* Giriş Kutusu (Glassmorphism) */
        .login-box {
            position: relative;
            width: 400px;
            padding: 50px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }

        .login-box h2 {
            color: #fff;
            text-align: center;
            font-size: 2em;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* Giriş Alanları */
        .input-box {
            position: relative;
            width: 100%;
            margin-bottom: 30px;
        }

        .input-box input {
            width: 100%;
            padding: 10px 0;
            font-size: 1em;
            color: #fff;
            letter-spacing: 1px;
            border: none;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            outline: none;
            background: transparent;
            transition: 0.5s;
        }

        .input-box label {
            position: absolute;
            top: 0;
            left: 0;
            padding: 10px 0;
            font-size: 1em;
            color: rgba(255,255,255,0.7);
            pointer-events: none; /* Tıklamayı engelle, inputa geçsin */
            transition: 0.5s;
        }

        /* Inputa tıklandığında veya içi doluyken etiket yukarı kaysın */
        .input-box input:focus ~ label,
        .input-box input:valid ~ label {
            top: -25px;
            left: 0;
            color: #fff;
            font-size: 0.85em;
        }

        .input-box input:focus {
            border-bottom: 2px solid #fff;
        }

        /* İkonlar */
        .input-box ion-icon {
            position: absolute;
            right: 0;
            top: 10px;
            color: #fff;
            font-size: 1.2em;
        }

        /* Şifremi Unuttum Linki */
        .forgot-pass {
            display: block;
            text-align: right;
            margin-top: -15px;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .forgot-pass a {
            text-decoration: none;
            color: rgba(255,255,255,0.7);
            transition: 0.3s;
        }

        .forgot-pass a:hover {
            color: #fff;
        }

        /* Giriş Butonu */
        button {
            width: 100%;
            height: 50px;
            background: #fff;
            border: none;
            outline: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1em;
            color: #333;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        button:hover {
            background: #ffeb3b; /* Buton rengi değişimi */
            color: #1f2029;
            box-shadow: 0 0 20px #ffeb3b;
            transform: scale(1.03);
        }

    </style>
</head>
<body>

    <div class="login-box">
        <form>
            <h2>Giriş Yap</h2>

            <div class="input-box">
                <input type="text" required>
                <label>Kullanıcı Adı</label>
                <ion-icon name="person-outline"></ion-icon>
            </div>

            <div class="input-box">
                <input type="password" required>
                <label>Şifre</label>
                <ion-icon name="lock-closed-outline"></ion-icon>
            </div>

            <div class="forgot-pass">
                <a href="şifre.html">Şifremi Unuttum?</a>
            </div>

            <button type="button" onclick="sayfayaGit()">GİRİŞ</button>

    <script>
    function sayfayaGit() {
        // Burada normalde şifre kontrolü yapılır, şimdilik direkt yönlendiriyoruz:
        window.location.href = "sifre.html"; // Veya ana sayfan neyse o
    }
    </script>
        </form>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

</body>
</html>
