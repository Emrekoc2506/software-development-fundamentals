<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Pro - Ana Sayfa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1f2029;
            overflow: hidden;
        }

        /* Farklı Renkte Arka Plan Işıkları */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: linear-gradient(#ff9966, #ff5e62); /* Turuncu Tonlar */
            border-radius: 50%;
            transform: translate(-150px, -100px);
            filter: blur(100px);
            z-index: -1;
            animation: pulse 5s infinite alternate;
        }

        body::after {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: linear-gradient(#00c6ff, #0072ff); /* Mavi Tonlar */
            border-radius: 50%;
            transform: translate(150px, 150px);
            filter: blur(100px);
            z-index: -1;
        }

        @keyframes pulse {
            0% { transform: translate(-150px, -100px) scale(1); }
            100% { transform: translate(-150px, -100px) scale(1.1); }
        }

        /* Karşılama Kartı */
        .welcome-card {
            text-align: center;
            width: 500px;
            padding: 50px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            color: #fff;
        }

        .welcome-card h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .welcome-card p {
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
        }

        .avatar {
            font-size: 4em;
            margin-bottom: 20px;
            color: #ffeb3b;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        /* Çıkış Butonu */
        .logout-btn {
            padding: 12px 30px;
            background: #ff5e62;
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 94, 98, 0.4);
        }

        .logout-btn:hover {
            background: #ff9966;
            box-shadow: 0 0 20px #ff9966;
        }

    </style>
</head>
<body>

    <div class="welcome-card">
        <div class="avatar">
            <ion-icon name="happy-outline"></ion-icon>
        </div>
        <h1>Hoşgeldin, Şampiyon!</h1>
        <p>Sisteme başarıyla giriş yaptın. Burası senin özel kontrol panelin.</p>
        
        <a href="giriş.html" class="logout-btn">
            <ion-icon name="log-out-outline" style="vertical-align: middle;"></ion-icon> ÇIKIŞ YAP
        </a>
    </div>
    

    <script type="module" src="https:/-/unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

</body>
</html>
