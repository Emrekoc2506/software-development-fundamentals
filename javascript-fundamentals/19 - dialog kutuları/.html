<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    /**
    *! Alert : kullanıcıya mesaj gönderme
    *! Prompt : Kullanıcıdan deger alma 
    *! Confirm : Kullanıcıya evet/hayır (tamam/iptal) sorusu sorar ve true veya false döner.
    */

    alert ("Hoş Geldiniz Efenim")
    
    let isim = prompt("isminizi giriniz :");
    let yas = prompt("Yanışınız giiniz :");
    // Kullanıcıdan alınan degerler her zaman string döner
    
    let sonuc = confirm ("Silme istediginize emin misiniz")
    console.log("isminiz :" + isim );
    console.log("yaşınız :" + yas );
    console.log(sonuc);

</script>
</body>
</html>
