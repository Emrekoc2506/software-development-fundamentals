<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
    let sayi = Number(prompt("lütfen bir sayı giriniz"))
    let sonuc =true;
    for (let i = 2; i<=Math.floor(sayi/2) ; i++ ){
        if(sayi%i==0){
            //sonuc asal degil
            sonuc=false;
            break;
        }
    }
    if(sonuc){
        alert(sayi +" asaldır")
    }
    else{
        alert(sayi + " Asal degildir!");
    }
</script>
</body>
</html>
