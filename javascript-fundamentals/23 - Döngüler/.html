<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
    
    for(let i=1; i<=10; i++){
        console.log(i);
    }
    for(let i = 0 ; i<=10 ; i+=2){     //   i + 2 = x        
        console.log(i);
    }
    for (let i = 0; i<=10 ; i++){
        if(i%2 ==0 ){
            console.log("Emre");
        }
        else{
            console.log("Koç");
        }
        let toplam = 0;
        for(let i =50 ; i>=1; i--){
            toplam += i;
            console.log(i);
        }
        console.log("1' den 50' ye kadar olan sayıların toplamı : ",toplam);
    }
</script>
</body>
</html>
