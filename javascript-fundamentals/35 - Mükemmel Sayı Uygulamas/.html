<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
    mukemmelSayi (6);
    function mukemmelSayi(sayi){
        let toplam = 0;
        for (let i = 2 ; i<=sayi/2; i++ ){
            if(sayi%i==0){
                toplam+=i;
            }
        }
        toplam+=1+sayi;
        if(sayi===toplam*2){
            console.log("mükemmel sayıdır");
        }
        else{
            console.log("mükemmel sayı degil");
        }
    }
</script>
</body>
</html>
