<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Converter</title>
</head>
<body>
<script>
    // Ondalık sayıyı binary'e çevirme (manuel yöntem)
    
    let ondaik = 10;

    function binary(number) {
        let binary = "";
        while (true) {
            binary += (number % 2).toString(); // Kalanı ekle (0 ya da 1)
            number = Math.floor(number / 2); // Sayıyı 2'ye böl ve tam kısmı al
            if (number == 1) {
                binary += 1; // Son 1'i de ekle
                break;
            }
        }
        let result = reverse(binary); // Tersine çevir
        console.log("Sonuç: " + result);
    }

    function reverse(binary) {
        let reverseBinary = "";
        for (let i = binary.length - 1; i >= 0; i--) {
            reverseBinary += binary.charAt(i);
        }
        return reverseBinary;
    }

    binary(ondaik); // Fonksiyonu çağır (örnek: 10 → 1010)

</script>
</body>
</html>
