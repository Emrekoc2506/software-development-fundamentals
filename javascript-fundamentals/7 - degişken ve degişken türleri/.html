<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script type="text/javascript"lang="javascript">
        /**

        *! Değişken   : İçerisinde her türden veriyi depolamak için kullanılan alanlara verilen isimlerdir
        
        *? Var        : Standart degişkeni tanımlamak için kullanılır
        *? let        : blok kapsamlı yerel degişken tanımlamak için kullanılır
        *? const      : sabit degişken tanımlamakta kullanılır
        */
        
        var    a = "Emre Koç"
        let    b = "Emre Koç"
        const  c = "Emre Koç"
        document.write(a);
        document.write(b);
        document.write(c);

    </script>
</body>
</html>
