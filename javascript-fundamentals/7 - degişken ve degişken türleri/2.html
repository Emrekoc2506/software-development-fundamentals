    <script type="text/javascript"lang="javascript">
        /**

        *! Değişken   : İçerisinde her türden veriyi depolamak için kullanılan alanlara verilen isimlerdir

        *? Var        : Standart degişkeni tanımlamak için kullanılır
        *? let        : blok kapsamlı yerel degişken tanımlamak için kullanılır
        *? const      : sabit degişken tanımlamakta kullanılır

        *! Degişken isimlendirme kurarları

        *? 1- Değişken isimleri     her zaman anlamlı olmalıdır
        *? 2- Degişken isimleri     harfler ile başlayabilir (Türkçe karakter kullanılmaz)
        *? 3- Degişken isimleri     _ alt cizgi ile başlayabilir
        *? 4- Degişken isimleri     $ dolar işareti ile başlayabilir
        *? 5- Degişken isimleri     Rakamlar ilk Başta kullanılamaz harften sonra yazılabilir
        *? 6- Degişken isimleri     BÜyük harf küçük harfe duyarlıdır
        *? 7- Degişken isimleri     jc tarafından rezerve edilmiş kelimeler olamaz (Örk : for , if)

        */
        
        var    a = "Emre Koç"
        let    b = "Emre Koç"
        const  c = "Emre Koç"
        document.write(a);
        document.write(b);
        document.write(c);

    </script>
