<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kişisel Web Sitesi</title>
<style>
    /* Genel ayarlar */
    body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    background: #f4f6f8;
    color: #333;
    line-height: 1.6;
    }

    header {
    background: #005f73;
    color: white;
    padding: 20px 0;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    header h1 {
    margin: 0;
    font-weight: 700;
    }

    nav {
    margin-top: 10px;
    }

    nav a {
    color: #caf0f8;
    margin: 0 15px;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s;
    }

    nav a:hover {
    color: #ffd60a;
    }

    main {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    section {
    margin-bottom: 40px;
    }

    h2 {
    color: #0077b6;
    margin-bottom: 10px;
    border-bottom: 2px solid #0077b6;
    padding-bottom: 5px;
    }

    p {
    font-size: 1.1rem;
    }

    footer {
    background: #001219;
    color: #94d2bd;
    text-align: center;
    padding: 15px 10px;
    font-size: 0.9rem;
    }

    @media (max-width: 600px) {
    nav a {
        display: block;
        margin: 8px 0;
    }
    main {
        margin: 20px 10px;
    }
    }
</style>
</head>
<body>

<header>
<h1>Merhaba, Ben Emre Koç</h1>
<nav>
    <a href="#hakkimda">Hakkımda</a>
    <a href="#projeler">Projeler</a>
    <a href="#iletisim">İletişim</a>
</nav>
</header>

<main>
<section id="hakkimda">
    <h2>Hakkımda</h2>
    <p>Herşey azdan olur !</p>
</section>

<section id="projeler">
    <h2>Projeler</h2>
    <ul>
    <li>Kişisel Web Sitesi Tasarımı</li>
    <li>Chatbot Geliştirme</li>
    <li>Veri Analizi ve Görselleştirme</li>
    </ul>
</section>

<section id="iletisim">
    <h2>İletişim</h2>
    <p>E-posta: emrekoc4615@gmail.com</p>
    <p>Telefon: +90 552 846 2006</p>
</section>
</main>

<footer>
&copy; Mustafa Emre Koç .
</footer>

</body>
</html>
